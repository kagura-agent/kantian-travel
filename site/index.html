<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>看天出发 — 周末去哪儿</title>
<link rel="stylesheet" href="style.css?v=5">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>if(!window.L){document.write('<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"><\/script>')}</script>
</head>
<body>
<!-- Top Bar -->
<header class="top-bar">
  <div class="top-bar-inner">
    <div class="location-pin" id="locationBtn">
      <span class="loc-icon">📍</span>
      <span class="loc-name">苏州</span>
    </div>
    <h1 class="app-name">看天出发</h1>
    <nav class="time-tabs" id="timeTabs"></nav>
    <button class="shortlist-btn" id="shortlistBtn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span class="badge" id="shortlistBadge">0</span>
    </button>
  </div>
</header>

<!-- Card List -->
<main class="card-list" id="cardList"></main>

<!-- Detail Overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-sheet" id="detailSheet">
    <button class="detail-close" id="detailClose">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<!-- Shortlist Panel -->
<div class="shortlist-overlay" id="shortlistOverlay">
  <div class="shortlist-panel">
    <div class="shortlist-header">
      <h2>我的收藏</h2>
      <button class="detail-close" id="shortlistClose">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="shortlist-body" id="shortlistBody"></div>
  </div>
</div>

<!-- Settings Panel -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <div class="settings-header">
      <h2>设置</h2>
      <button class="detail-close" id="settingsClose">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <h3 class="settings-label">📍 当前位置</h3>
        <div class="city-options" id="cityOptions">
          <button class="city-btn active" data-city="苏州">苏州</button>
          <button class="city-btn" data-city="上海">上海</button>
          <button class="city-btn" data-city="杭州">杭州</button>
          <button class="city-btn" data-city="南京">南京</button>
          <button class="city-btn" data-city="无锡">无锡</button>
        </div>
        <p class="settings-hint">通常自动定位，也可以手动切换</p>
      </div>
      <div class="settings-section">
        <h3 class="settings-label">🗓️ 时间</h3>
        <div class="tag-options" data-group="time">
          <label class="tag-toggle"><input type="checkbox" data-tag="now" checked><span>现在</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="tomorrow" checked><span>明天</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="weekend" checked><span>这周末</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="next-weekend" checked><span>下周末</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="3day" checked><span>请3天假</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="5day" checked><span>小长假5天</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="week" checked><span>找7天连晴</span></label>
        </div>
      </div>
      <div class="settings-section">
        <h3 class="settings-label">🏷️ 主题</h3>
        <div class="tag-options" data-group="theme">
          <label class="tag-toggle"><input type="checkbox" data-tag="camping" checked><span>露营</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="hiking" checked><span>徒步</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="family" checked><span>亲子</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="food" checked><span>美食</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="oldtown" checked><span>古镇</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="beach" checked><span>海边</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="hotspring" checked><span>泡温泉</span></label>
        </div>
      </div>
      <div class="settings-section">
        <h3 class="settings-label">📏 距离</h3>
        <div class="tag-options" data-group="distance">
          <label class="tag-toggle"><input type="checkbox" data-tag="1h" checked><span>1h内</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="2h" checked><span>2h内</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="halfday" checked><span>半日</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="fullday" checked><span>一日游</span></label>
        </div>
      </div>
      <div class="settings-section">
        <h3 class="settings-label">✨ 氛围</h3>
        <div class="tag-options" data-group="vibe">
          <label class="tag-toggle"><input type="checkbox" data-tag="quiet" checked><span>人少</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="niche" checked><span>小众</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="popular" checked><span>网红打卡</span></label>
          <label class="tag-toggle"><input type="checkbox" data-tag="free" checked><span>免门票</span></label>
        </div>
      </div>
      <p class="settings-hint">关掉不需要的标签，只看你关心的</p>
    </div>
  </div>
</div>

<script src="data-final.js?v=2"></script>
<script src="app-v2.js?v=5"></script>
</body>
</html>
